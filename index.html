<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Видео-сетка</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Видео">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Основная область: дерево ячеек строится JS-ом -->
  <div class="canvas" id="canvas"></div>

  <!-- Нижняя выезжающая шторка со списком видео -->
  <div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheetHandle">
      <div class="handle-bar"></div>
    </div>
    <div class="sheet-content">
      <div class="sheet-grid" id="sheetGrid"></div>
    </div>
  </div>

  <!-- Плавающая иконка-призрак при перетаскивании -->
  <div class="drag-ghost" id="dragGhost"></div>

  <!-- Попап выбора направления разбиения ячейки -->
  <div class="split-overlay" id="splitOverlay">
    <div class="split-card">
      <div class="split-card-title">Куда вставить видео?</div>
      <div class="split-options">
        <button class="split-option" data-dir="h">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="7" rx="1.3"/><rect x="3" y="13" width="18" height="7" rx="1.3"/></svg>
          <span>Сверху / снизу</span>
        </button>
        <button class="split-option" data-dir="v">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="8" height="16" rx="1.3"/><rect x="13" y="4" width="8" height="16" rx="1.3"/></svg>
          <span>Слева / справа</span>
        </button>
      </div>
      <button class="split-cancel" id="splitCancel">Отмена</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
